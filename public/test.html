<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Chatbot Test</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px;
        }

        /* This represents the floating launcher button the senior will build */
        #custom-launcher {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f8ef7 0%, #7c3aed 100%);
            border: none;
            cursor: pointer;
            box-shadow: 0 16px 32px rgba(79, 142, 247, 0.45);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* This is the container for the iframe */
        #chatbot-wrapper {
            position: fixed;
            bottom: 100px; /* Sits above the button */
            right: 28px;
            width: 480px;
            height: 720px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 120px);
            z-index: 999;
            display: none; /* Hidden by default */
            
            /* Add some nice shadow to the container itself since the iframe is transparent */
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            overflow: hidden;
        }

        #chatbot-wrapper.open {
            display: block;
        }

        /* The actual iframe */
        .chatbot-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <h1>Host Website Simulation</h1>
    <p>This page simulates how your senior will embed the chatbot.</p>
    <p>They control the floating button, the open/close state, and the width/height of the wrapper.</p>
    
    <!-- The Chatbot Container -->
    <div id="chatbot-wrapper">
        <iframe 
            src="/chatbot" 
            class="chatbot-iframe"
            title="SurveyBooker Chatbot">
        </iframe>
    </div>

    <!-- The Launcher Button -->
    <button id="custom-launcher" onclick="toggleChat()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37C8.42 21.5 10.15 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" />
        </svg>
    </button>

    <script>
        function toggleChat() {
            const wrapper = document.getElementById('chatbot-wrapper');
            wrapper.classList.toggle('open');
        }
    </script>
</body>
</html>
